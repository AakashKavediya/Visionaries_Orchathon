<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clash Detection & Rerouting System | CEC Hackathon 2025</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Header Section */
        .header {
            background: rgba(15, 25, 35, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 12px;
            color: #8899aa;
            margin-top: 4px;
        }

        .stats-badge {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 11px;
            color: #8899aa;
            text-transform: uppercase;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 40px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            color: #8899aa;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Dashboard Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.12);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .card-icon i {
            font-size: 24px;
        }

        .card-title {
            font-size: 14px;
            color: #8899aa;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-sub {
            font-size: 12px;
            color: #667eea;
        }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        canvas {
            max-height: 250px;
        }

        /* Table Styles */
        .table-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px 16px;
            gap: 10px;
        }

        .search-box i {
            color: #8899aa;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            width: 200px;
        }

        .search-box input::placeholder {
            color: #8899aa;
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-select {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }

        .filter-select option {
            background: #1a1a2e;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 10px;
            font-size: 12px;
            font-weight: 600;
            color: #8899aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 14px 10px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: middle;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Badge Styles */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-pipe {
            background: rgba(33, 150, 243, 0.2);
            color: #42a5f5;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }

        .badge-duct {
            background: rgba(156, 39, 176, 0.2);
            color: #ce93d8;
            border: 1px solid rgba(156, 39, 176, 0.3);
        }

        .badge-structure {
            background: rgba(244, 67, 54, 0.2);
            color: #ef9a9a;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .badge-cable {
            background: rgba(255, 152, 0, 0.2);
            color: #ffb74d;
            border: 1px solid rgba(255, 152, 0, 0.3);
        }

        .badge-resolved {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .badge-pending {
            background: rgba(255, 152, 0, 0.2);
            color: #ffb74d;
        }

        .severity-high {
            color: #ef5350;
        }

        .severity-mid {
            color: #ff9800;
        }

        .severity-low {
            color: #4caf50;
        }

        /* Position Coordinates */
        .coord {
            font-family: 'Monaco', monospace;
            font-size: 11px;
            color: #8899aa;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .page-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover, .page-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* Export Button */
        .export-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .export-btn:hover {
            transform: scale(1.02);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
            .header-content {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Loading Animation */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tooltip */
        .tooltip {
            position: relative;
            cursor: help;
        }

        .tooltip:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo">
            <h1><i class="fas fa-robot"></i> AI Clash Detection & Rerouting System</h1>
            <p>CEC Hackathon 2025 | BIM Intelligence Platform</p>
        </div>
        <div class="stats-badge" id="headerStats">
            <div class="stat-item">
                <div class="stat-number" id="statTotal">-</div>
                <div class="stat-label">Total Clashes</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="statResolved">-</div>
                <div class="stat-label">Resolved</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="statRate">-</div>
                <div class="stat-label">Resolution Rate</div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="clashes">
            <i class="fas fa-bolt"></i> All Clashes
        </button>
        <button class="tab-btn" data-tab="resolved">
            <i class="fas fa-check-circle"></i> Resolved
        </button>
        <button class="tab-btn" data-tab="pending">
            <i class="fas fa-clock"></i> Pending
        </button>
        <button class="tab-btn" data-tab="statistics">
            <i class="fas fa-chart-pie"></i> Analytics
        </button>
    </div>

    <!-- Dashboard Cards (visible on all tabs) -->
    <div class="dashboard-grid" id="dashboardGrid"></div>

    <!-- Charts Row (Statistics tab) -->
    <div class="charts-row" id="chartsRow" style="display: none;">
        <div class="chart-card">
            <div class="chart-title">
                <i class="fas fa-chart-pie"></i> Clash Types Distribution
            </div>
            <canvas id="typeChart"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-title">
                <i class="fas fa-chart-bar"></i> Resolution Status
            </div>
            <canvas id="statusChart"></canvas>
        </div>
    </div>

    <!-- Table Container -->
    <div class="table-container">
        <div class="table-header">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by ID, element name...">
            </div>
            <div class="filter-group">
                <select id="typeFilter" class="filter-select">
                    <option value="all">All Types</option>
                    <option value="PIPE_DUCT">Pipe vs Duct</option>
                    <option value="PIPE_PIPE">Pipe vs Pipe</option>
                    <option value="DUCT_DUCT">Duct vs Duct</option>
                    <option value="PIPE_STRUCTURE">Pipe vs Structure</option>
                    <option value="DUCT_STRUCTURE">Duct vs Structure</option>
                </select>
                <select id="severityFilter" class="filter-select">
                    <option value="all">All Severities</option>
                    <option value="high">High (≥0.1m penetration)</option>
                    <option value="mid">Medium (0.05-0.1m)</option>
                    <option value="low">Low (<0.05m)</option>
                </select>
                <button class="export-btn" id="exportBtn">
                    <i class="fas fa-download"></i> Export Report
                </button>
            </div>
        </div>
        
        <div id="tableLoading" class="loading" style="display: none;">
            <div class="spinner"></div>
        </div>
        
        <div id="tableContent"></div>
        
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
// ============================================================================
// DATA (from your Navisworks XML parsing results)
// ============================================================================

const clashData = [
    { clash_id: "Clash1", distance: -0.125, position: { x: 6.217, y: 13.867, z: 8.720 }, 
      item1: { id: "9512141", name: "FAD", type: "Solid", norm_type: "DUCT" },
      item2: { id: "9447390", name: "FAD", type: "Solid", norm_type: "DUCT" },
      clash_type: "DUCT_DUCT", resolved: true, strategy: "OFFSET", new_position: { x: 6.217, y: 13.867, z: 9.720 } },
    { clash_id: "Clash2", distance: -0.117, position: { x: 13.179, y: 12.850, z: 4.055 }, 
      item1: { id: "9512098", name: "FAD", type: "Solid", norm_type: "DUCT" },
      item2: { id: "9655153", name: "SAD", type: "Solid", norm_type: "DUCT" },
      clash_type: "DUCT_DUCT", resolved: true, strategy: "OFFSET", new_position: { x: 13.179, y: 12.850, z: 5.055 } },
    { clash_id: "Clash3", distance: -0.102, position: { x: 21.297, y: 6.566, z: -0.172 }, 
      item1: { id: "9778240", name: "MANHOLE", type: "Solid", norm_type: "STRUCTURE" },
      item2: { id: "8754584", name: "Soil Pipe", type: "Solid", norm_type: "PIPE" },
      clash_type: "PIPE_STRUCTURE", resolved: true, strategy: "LATERAL", new_position: { x: 21.797, y: 6.566, z: -0.172 } },
    { clash_id: "Clash4", distance: -0.100, position: { x: 6.242, y: 13.867, z: 8.625 }, 
      item1: { id: "9497495", name: "FAD", type: "Solid", norm_type: "DUCT" },
      item2: { id: "9447390", name: "FAD", type: "Solid", norm_type: "DUCT" },
      clash_type: "DUCT_DUCT", resolved: true, strategy: "OFFSET", new_position: { x: 6.242, y: 13.867, z: 9.625 } },
    { clash_id: "Clash5", distance: -0.100, position: { x: 6.217, y: 14.092, z: 8.600 }, 
      item1: { id: "9512141", name: "FAD", type: "Solid", norm_type: "DUCT" },
      item2: { id: "9437364", name: "FAD", type: "Solid", norm_type: "DUCT" },
      clash_type: "DUCT_DUCT", resolved: true, strategy: "LATERAL", new_position: { x: 6.717, y: 14.092, z: 8.600 } },
    { clash_id: "Clash8", distance: -0.097, position: { x: 9.286, y: -7.744, z: -0.170 }, 
      item1: { id: "9747794", name: "Vent Pipe", type: "Solid", norm_type: "PIPE" },
      item2: { id: "9778645", name: "MANHOLE", type: "Solid", norm_type: "STRUCTURE" },
      clash_type: "PIPE_STRUCTURE", resolved: true, strategy: "OFFSET", new_position: { x: 9.286, y: -7.744, z: 0.830 } },
    { clash_id: "Clash9", distance: -0.097, position: { x: -1.950, y: 4.507, z: -0.227 }, 
      item1: { id: "9740353", name: "MANHOLE", type: "Solid", norm_type: "STRUCTURE" },
      item2: { id: "9741501", name: "Soil Pipe", type: "Solid", norm_type: "PIPE" },
      clash_type: "PIPE_STRUCTURE", resolved: false, strategy: null, new_position: null },
    { clash_id: "Clash10", distance: -0.096, position: { x: 5.774, y: 9.059, z: 8.300 }, 
      item1: { id: "9512143", name: "FAD", type: "Solid", norm_type: "DUCT" },
      item2: { id: "9697637", name: "TED", type: "Solid", norm_type: "DUCT" },
      clash_type: "DUCT_DUCT", resolved: true, strategy: "DETOUR", new_position: { x: 5.774, y: 9.559, z: 9.050 } },
    { clash_id: "Clash11", distance: -0.092, position: { x: 13.179, y: 12.850, z: 4.051 }, 
      item1: { id: "9325758", name: "FAD", type: "Solid", norm_type: "DUCT" },
      item2: { id: "9655153", name: "SAD", type: "Solid", norm_type: "DUCT" },
      clash_type: "DUCT_DUCT", resolved: false, strategy: null, new_position: null },
    { clash_id: "Clash12", distance: -0.092, position: { x: 13.204, y: 12.850, z: 3.917 }, 
      item1: { id: "9512098", name: "FAD", type: "Solid", norm_type: "DUCT" },
      item2: { id: "9757946", name: "SAD", type: "Solid", norm_type: "DUCT" },
      clash_type: "DUCT_DUCT", resolved: false, strategy: null, new_position: null },
    { clash_id: "Clash13", distance: -0.091, position: { x: 9.537, y: -3.211, z: -0.296 }, 
      item1: { id: "9778562", name: "MANHOLE", type: "Solid", norm_type: "STRUCTURE" },
      item2: { id: "9741135", name: "Soil Pipe", type: "Solid", norm_type: "PIPE" },
      clash_type: "PIPE_STRUCTURE", resolved: true, strategy: "LATERAL", new_position: { x: 10.037, y: -3.211, z: -0.296 } },
    { clash_id: "Clash14", distance: -0.091, position: { x: 13.179, y: 12.850, z: 3.973 }, 
      item1: { id: "9512103", name: "FAD", type: "Solid", norm_type: "DUCT" },
      item2: { id: "9655153", name: "SAD", type: "Solid", norm_type: "DUCT" },
      clash_type: "DUCT_DUCT", resolved: false, strategy: null, new_position: null },
];

// Calculate derived stats
const totalClashes = clashData.length;
const resolvedClashes = clashData.filter(c => c.resolved).length;
const resolutionRate = ((resolvedClashes / totalClashes) * 100).toFixed(1);

// Update header stats
document.getElementById('statTotal').innerText = totalClashes;
document.getElementById('statResolved').innerText = resolvedClashes;
document.getElementById('statRate').innerText = `${resolutionRate}%`;

// Dashboard card data
const dashboardCards = [
    { icon: "fa-bolt", title: "Total Clashes", value: totalClashes, sub: "Across all MEP systems", color: "#667eea" },
    { icon: "fa-check-circle", title: "Resolved", value: resolvedClashes, sub: `${resolutionRate}% resolution rate`, color: "#4caf50" },
    { icon: "fa-clock", title: "Pending", value: totalClashes - resolvedClashes, sub: "Awaiting rerouting", color: "#ff9800" },
    { icon: "fa-chart-line", title: "Avg Penetration", value: `${Math.abs(clashData.reduce((a,b) => a + b.distance, 0) / totalClashes).toFixed(3)}m`, sub: "Average clash depth", color: "#f44336" },
];

// Render dashboard cards
function renderDashboard() {
    const grid = document.getElementById('dashboardGrid');
    grid.innerHTML = dashboardCards.map(card => `
        <div class="card">
            <div class="card-icon" style="background: linear-gradient(135deg, ${card.color}, ${card.color}aa);">
                <i class="fas ${card.icon}"></i>
            </div>
            <div class="card-title">${card.title}</div>
            <div class="card-value">${card.value}</div>
            <div class="card-sub">${card.sub}</div>
        </div>
    `).join('');
}

// Get severity class based on distance
function getSeverity(distance) {
    const absDist = Math.abs(distance);
    if (absDist >= 0.1) return { class: 'severity-high', text: 'High', icon: 'fa-exclamation-triangle' };
    if (absDist >= 0.05) return { class: 'severity-mid', text: 'Medium', icon: 'fa-chart-line' };
    return { class: 'severity-low', text: 'Low', icon: 'fa-info-circle' };
}

// Get badge class for element type
function getTypeBadge(type) {
    const badges = {
        'PIPE': 'badge-pipe',
        'DUCT': 'badge-duct',
        'STRUCTURE': 'badge-structure',
        'CABLE_TRAY': 'badge-cable'
    };
    return badges[type] || 'badge-pipe';
}

// Render table
let currentPage = 1;
let rowsPerPage = 10;
let currentTab = 'clashes';
let currentSearch = '';
let currentTypeFilter = 'all';
let currentSeverityFilter = 'all';

function getFilteredData() {
    let data = [...clashData];
    
    // Filter by tab
    if (currentTab === 'resolved') {
        data = data.filter(c => c.resolved);
    } else if (currentTab === 'pending') {
        data = data.filter(c => !c.resolved);
    }
    
    // Filter by search
    if (currentSearch) {
        const searchLower = currentSearch.toLowerCase();
        data = data.filter(c => 
            c.clash_id.toLowerCase().includes(searchLower) ||
            c.item1.id.includes(searchLower) ||
            c.item2.id.includes(searchLower) ||
            c.item1.name.toLowerCase().includes(searchLower) ||
            c.item2.name.toLowerCase().includes(searchLower)
        );
    }
    
    // Filter by clash type
    if (currentTypeFilter !== 'all') {
        data = data.filter(c => c.clash_type === currentTypeFilter);
    }
    
    // Filter by severity
    if (currentSeverityFilter !== 'all') {
        const absDist = Math.abs;
        if (currentSeverityFilter === 'high') {
            data = data.filter(c => absDist(c.distance) >= 0.1);
        } else if (currentSeverityFilter === 'mid') {
            data = data.filter(c => absDist(c.distance) >= 0.05 && absDist(c.distance) < 0.1);
        } else if (currentSeverityFilter === 'low') {
            data = data.filter(c => absDist(c.distance) < 0.05);
        }
    }
    
    return data;
}

function renderTable() {
    const filteredData = getFilteredData();
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    const start = (currentPage - 1) * rowsPerPage;
    const pageData = filteredData.slice(start, start + rowsPerPage);
    
    const tableHtml = `
        <table>
            <thead>
                <tr>
                    <th>Clash ID</th>
                    <th>Type</th>
                    <th>Severity</th>
                    <th>Element 1</th>
                    <th>Element 2</th>
                    <th>Clash Point (X, Y, Z)</th>
                    <th>Penetration</th>
                    <th>Status</th>
                    <th>Solution</th>
                </tr>
            </thead>
            <tbody>
                ${pageData.map(clash => {
                    const severity = getSeverity(clash.distance);
                    const type1Badge = getTypeBadge(clash.item1.norm_type);
                    const type2Badge = getTypeBadge(clash.item2.norm_type);
                    
                    return `
                        <tr>
                            <td><strong>${clash.clash_id}</strong></td>
                            <td><span class="badge" style="background: rgba(102,126,234,0.2); color: #667eea;">${clash.clash_type}</span></td>
                            <td class="${severity.class}"><i class="fas ${severity.icon}"></i> ${severity.text}</td>
                            <td>
                                <span class="badge ${type1Badge}">${clash.item1.norm_type}</span>
                                <div style="font-size: 11px; margin-top: 4px;">${clash.item1.name} (${clash.item1.id})</div>
                            </td>
                            <td>
                                <span class="badge ${type2Badge}">${clash.item2.norm_type}</span>
                                <div style="font-size: 11px; margin-top: 4px;">${clash.item2.name} (${clash.item2.id})</div>
                            </td>
                            <td class="coord">(${clash.position.x.toFixed(3)}, ${clash.position.y.toFixed(3)}, ${clash.position.z.toFixed(3)})</td>
                            <td class="${severity.class}">${(clash.distance * 1000).toFixed(0)}mm</td>
                            <td>
                                ${clash.resolved ? 
                                    '<span class="badge badge-resolved"><i class="fas fa-check"></i> Resolved</span>' : 
                                    '<span class="badge badge-pending"><i class="fas fa-clock"></i> Pending</span>'}
                            </td>
                            <td>
                                ${clash.resolved ? `
                                    <div class="tooltip" data-tip="${clash.strategy}: Move to (${clash.new_position.x.toFixed(3)}, ${clash.new_position.y.toFixed(3)}, ${clash.new_position.z.toFixed(3)})">
                                        <i class="fas fa-arrows-alt" style="color: #4caf50;"></i> ${clash.strategy}
                                    </div>
                                ` : '<span style="color: #8899aa;">-</span>'}
                            </td>
                        </tr>
                    `;
                }).join('')}
            </tbody>
        </table>
    `;
    
    document.getElementById('tableContent').innerHTML = tableHtml;
    
    // Render pagination
    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const paginationDiv = document.getElementById('pagination');
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    
    let pages = [];
    for (let i = 1; i <= Math.min(totalPages, 5); i++) {
        pages.push(i);
    }
    if (totalPages > 5) {
        pages.push('...', totalPages);
    }
    
    paginationDiv.innerHTML = `
        <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
            <i class="fas fa-chevron-left"></i>
        </button>
        ${pages.map(p => p === '...' ? 
            '<span style="padding: 8px 12px;">...</span>' : 
            `<button class="page-btn ${currentPage === p ? 'active' : ''}" onclick="changePage(${p})">${p}</button>`
        ).join('')}
        <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
            <i class="fas fa-chevron-right"></i>
        </button>
    `;
}

function changePage(page) {
    const filteredData = getFilteredData();
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
}

// Charts
let typeChart, statusChart;

function initCharts() {
    // Type distribution
    const typeCount = {};
    clashData.forEach(c => {
        typeCount[c.clash_type] = (typeCount[c.clash_type] || 0) + 1;
    });
    
    const ctx1 = document.getElementById('typeChart').getContext('2d');
    typeChart = new Chart(ctx1, {
        type: 'doughnut',
        data: {
            labels: Object.keys(typeCount),
            datasets: [{
                data: Object.values(typeCount),
                backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: '#fff' } }
            }
        }
    });
    
    // Status distribution
    const ctx2 = document.getElementById('statusChart').getContext('2d');
    statusChart = new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Resolved', 'Pending'],
            datasets: [{
                label: 'Number of Clashes',
                data: [resolvedClashes, totalClashes - resolvedClashes],
                backgroundColor: ['#4caf50', '#ff9800'],
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: '#fff' } }
            },
            scales: {
                y: { ticks: { color: '#8899aa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                x: { ticks: { color: '#fff' } }
            }
        }
    });
}

// Tab switching
function switchTab(tabId) {
    currentTab = tabId;
    currentPage = 1;
    
    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-tab') === tabId) {
            btn.classList.add('active');
        }
    });
    
    // Show/hide charts row
    const chartsRow = document.getElementById('chartsRow');
    chartsRow.style.display = tabId === 'statistics' ? 'grid' : 'none';
    
    // Refresh table
    renderTable();
    
    // Refresh charts if needed
    if (tabId === 'statistics' && typeChart) {
        typeChart.update();
        statusChart.update();
    }
}

// Export to CSV
function exportToCSV() {
    const filteredData = getFilteredData();
    const headers = ['Clash ID', 'Type', 'Distance (m)', 'Position X', 'Position Y', 'Position Z', 
                     'Element1 ID', 'Element1 Name', 'Element1 Type', 
                     'Element2 ID', 'Element2 Name', 'Element2 Type', 'Resolved', 'Strategy'];
    
    const rows = filteredData.map(c => [
        c.clash_id, c.clash_type, c.distance.toFixed(3),
        c.position.x.toFixed(3), c.position.y.toFixed(3), c.position.z.toFixed(3),
        c.item1.id, c.item1.name, c.item1.norm_type,
        c.item2.id, c.item2.name, c.item2.norm_type,
        c.resolved ? 'Yes' : 'No',
        c.resolved ? c.strategy : ''
    ]);
    
    const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `clash_report_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    currentPage = 1;
    renderTable();
});

document.getElementById('typeFilter').addEventListener('change', (e) => {
    currentTypeFilter = e.target.value;
    currentPage = 1;
    renderTable();
});

document.getElementById('severityFilter').addEventListener('change', (e) => {
    currentSeverityFilter = e.target.value;
    currentPage = 1;
    renderTable();
});

document.getElementById('exportBtn').addEventListener('click', exportToCSV);

// Initialize
renderDashboard();
initCharts();
renderTable();

// Tab event listeners
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
});
</script>
